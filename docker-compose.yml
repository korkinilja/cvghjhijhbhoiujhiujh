services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-budgetdb}
      POSTGRES_USER: ${DB_USER:-budgetuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-budgetpass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 30

  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: bash -lc "
      python manage.py migrate &&
      if [ "$$RUN_START_DATA" = "1" ]; then
        python manage.py start_data --force --password "$$START_DATA_PASSWORD";
      fi &&
      python manage.py runserver 0.0.0.0:8000
      "

volumes:
  pgdata: